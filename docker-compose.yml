# Development compose — hot-reload, source mounts, verbose logging
services:
  mongo:
    image: mongo:7
    container_name: ecommerce_mongo
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_INITDB_ROOT_USERNAME}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_INITDB_ROOT_PASSWORD}
      MONGO_INITDB_DATABASE: ecommerce
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - ecommerce_net

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: development
    container_name: ecommerce_backend
    restart: unless-stopped
    depends_on:
      mongo:
        condition: service_healthy
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: ${PORT:-5000}
      MONGO_URI: ${MONGO_URI}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      CLOUDINARY_CLOUD_NAME: ${CLOUDINARY_CLOUD_NAME}
      CLOUDINARY_API_KEY: ${CLOUDINARY_API_KEY}
      CLOUDINARY_API_SECRET: ${CLOUDINARY_API_SECRET}
      CLIENT_ORIGIN: ${CLIENT_ORIGIN:-http://localhost:3000}
      CLAID_API_KEY: ${CLAID_API_KEY:-}
      RAZORPAY_KEY_ID: ${RAZORPAY_KEY_ID}
      RAZORPAY_KEY_SECRET: ${RAZORPAY_KEY_SECRET}
    ports:
      - "5000:5000"
    volumes:
      - ./backend/src:/app/src:ro
    networks:
      - ecommerce_net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: development
    container_name: ecommerce_frontend
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:5000/api/v1}
      NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL:-http://localhost:3000}
      NEXT_PUBLIC_RAZORPAY_KEY_ID: ${NEXT_PUBLIC_RAZORPAY_KEY_ID:-}
    ports:
      - "3000:3000"
    volumes:
      - ./frontend/src:/app/src:ro
      - ./frontend/public:/app/public:ro
    networks:
      - ecommerce_net

  ai-service:
    build:
      context: ./ai-service
      dockerfile: Dockerfile
    container_name: ecommerce_ai_service
    restart: unless-stopped
    environment:
      PORT: 8000
      BACKEND_URL: http://backend:5000
      INTERNAL_SECRET: ${INTERNAL_SECRET:-three-d-ai-internal-bypass-key}
      AUTO_GENERATE_3D: ${AUTO_GENERATE_3D:-true}
    ports:
      - "8000:8000"
    volumes:
      - ./ai-service:/app
      - pytorch_cache:/root/.cache
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    networks:
      - ecommerce_net

volumes:
  mongo_data:
  pytorch_cache:

networks:
  ecommerce_net:
    driver: bridge
